@if (message(); as toast) {
  <div class="fixed top-4 right-4 z-50">
    <div
      class="min-w-[260px] max-w-sm rounded-lg shadow-xl px-4 py-3 flex items-start justify-between gap-3"
      [ngClass]="classes()">
      <p class="text-sm font-medium">{{ toast.text }}</p>
      <button
        type="button"
        (click)="dismiss()"
        class="opacity-80 hover:opacity-100 text-sm font-bold">
        ×
      </button>
    </div>
  </div>
}
