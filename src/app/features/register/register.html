<div class="min-h-screen flex items-center justify-center bg-gray-100 p-4">
  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Criar Conta</h2>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
        <input type="text" formControlName="name" 
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
        <span *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" class="text-red-500 text-xs">
          O nome é obrigatório (mín. 3 caracteres).
        </span>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">E-mail</label>
        <input type="email" formControlName="email" 
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Senha</label>
        <input type="password" formControlName="password" 
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
      </div>

      <button type="submit" [disabled]="registerForm.invalid"
              class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 disabled:bg-gray-400 transition-colors font-bold mt-4">
        Finalizar Cadastro
      </button>

      <div class="text-center mt-4">
        <a routerLink="/login" class="text-sm text-blue-600 hover:underline">Já tenho uma conta. Voltar ao login.</a>
      </div>
    </form>
  </div>
</div>
