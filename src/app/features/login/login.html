<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
      <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Financeiro App</h2>
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">E-mail</label>
          <input type="email" formControlName="email" 
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
          <span *ngIf="loginForm.get('login')?.invalid && loginForm.get('login')?.touched" class="text-red-500 text-xs">
            E-mail inválido
          </span>
        </div>
  
        <div>
          <label class="block text-sm font-medium text-gray-700">Senha</label>
          <input type="password" formControlName="password" 
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>
  
        <button type="submit" [disabled]="loginForm.invalid"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 disabled:bg-gray-400 transition-colors">
          Entrar
        </button>
        <div class="mt-6 text-center">
          <p class="text-sm text-gray-600">
            Ainda não tem uma conta? 
            <a routerLink="/register" class="text-blue-600 hover:underline font-medium cursor-pointer">
              Cadastre-se aqui
            </a>
          </p>
        </div>
      </form>
    </div>
  </div>
